# yaml-language-server: $schema=../scripts/pod-scheduler/pod-config.schema.json

# Cobalt-hosted pod-scheduler config.
#
# Two physical Linux clusters (default + Azure Linux 3) plus the same
# clusters running a 28-core SUT profile. Generates a single
# ./benchmarks-ci-cobalt.yml.
#
# Edit this file then regenerate from the repo root:
#   python ./scripts/pod-scheduler/main.py \
#       --config ./build/benchmarks_ci_cobalt_pods.yml \
#       --base-name benchmarks-ci-cobalt --yaml-output ./build
metadata:
  name: Cobalt Hosted CI Benchmarks Configuration
  description: Pod-based scheduling for cobalt hosted CI benchmarks
  version: "2.0"
  schedule: "0 3/12 * * *"
  queues:
    - cobalthosted
    - cobalthosted_azurelinux3
  yaml_generation:
    target_yaml_count: 1
    schedule_offset_hours: 0

# The "-28" pods reuse the same physical machines as their non-28 siblings
# (just a different SUT crank profile that pins to 28 cores). The scheduler
# automatically keeps each physical machine to one stage at a time.
pods:
  - name: cobalt-hosted-lin
    machines: { sut: cobalt-hosted-lin-server, load: cobalt-hosted-lin-client, db: cobalt-hosted-lin-db }
    profiles: { sut: cobalt-hosted-lin-server-app, load: cobalt-hosted-lin-client-load, db: cobalt-hosted-lin-db-db }

  - name: cobalt-hosted-lin-azl3
    machines: { sut: cobalt-hosted-lin-server-azl3, load: cobalt-hosted-lin-client-azl3, db: cobalt-hosted-lin-db-azl3 }
    profiles: { sut: cobalt-hosted-lin-server-azure-linux3-app, load: cobalt-hosted-lin-client-azure-linux3-load, db: cobalt-hosted-lin-db-azure-linux3-db }

  - name: cobalt-hosted-lin-28
    machines: { sut: cobalt-hosted-lin-server, load: cobalt-hosted-lin-client, db: cobalt-hosted-lin-db }
    profiles: { sut: cobalt-hosted-lin-server-28-app, load: cobalt-hosted-lin-client-load, db: cobalt-hosted-lin-db-db }

  - name: cobalt-hosted-lin-azl3-28
    machines: { sut: cobalt-hosted-lin-server-azl3, load: cobalt-hosted-lin-client-azl3, db: cobalt-hosted-lin-db-azl3 }
    profiles: { sut: cobalt-hosted-lin-server-azure-linux3-28-app, load: cobalt-hosted-lin-client-azure-linux3-load, db: cobalt-hosted-lin-db-azure-linux3-db }

scenarios:
  - name: Containers
    template: containers-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3]
    estimated_runtime: 90

  - name: PGO
    template: pgo-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 90

  - name: Baselines Database
    template: baselines-database-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 45

  - name: Baselines
    template: baselines-scenarios.yml
    type: dual
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 30

  - name: Frameworks Database
    template: frameworks-database-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 20

  - name: MVC
    template: mvc-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3]
    estimated_runtime: 20

  - name: NativeAOT
    template: nativeaot-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 20

  - name: Trends
    template: trend-scenarios.yml
    type: dual
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 20

  - name: Trends Database
    template: trend-database-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 15

  - name: Crossgen
    template: crossgen2-scenarios.yml
    type: dual
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 5

  - name: Frameworks
    template: frameworks-scenarios.yml
    type: triple
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 15

  - name: GC
    template: gc-scenarios.yml
    type: single
    pods: [cobalt-hosted-lin, cobalt-hosted-lin-azl3, cobalt-hosted-lin-28, cobalt-hosted-lin-azl3-28]
    estimated_runtime: 15
