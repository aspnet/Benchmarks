# Do not change this file, it is generated by the pod-scheduler.
# Source of truth: see ../scripts/pod-scheduler/README.md
# To regenerate, run from the repo root:
#   python ./scripts/pod-scheduler/main.py --config ./build/benchmarks_ci_cobalt_pods.json --base-name benchmarks-ci-cobalt --yaml-output ./build

trigger: none
pr: none

schedules:
- cron: "0 3/12 * * *"
  always: true
  branches:
    include:
    - main

variables:
  - template: job-variables.yml
  - name: session
    value: $(Build.BuildNumber)
  - name: buildId
    value: $(Build.BuildId)
  - name: buildNumber
    value: $(Build.BuildNumber)
  - name: am
    value: $[lt(format('{0:HH}', pipeline.startTime), 12)]
  - name: pm
    value: $[ge(format('{0:HH}', pipeline.startTime), 12)]

jobs:

# GROUP 1

- job: Containers_cobalt_hosted_lin
  displayName: 1- Containers cobalt-hosted-lin
  pool: server
  timeoutInMinutes: 180
  dependsOn: []
  condition: succeededOrFailed()
  steps:
  - template: containers-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: cobalthosted
      serviceBusNamespace: aspnetbenchmarks
      arguments: "$(ciProfile) --profile cobalt-hosted-lin-server-app --profile cobalt-hosted-lin-client-load --profile cobalt-hosted-lin-db-db "

- job: Containers_cobalt_hosted_lin_azl3
