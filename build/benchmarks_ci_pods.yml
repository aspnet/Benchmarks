# yaml-language-server: $schema=../scripts/pod-scheduler/pod-config.schema.json

# CI pod-scheduler config: on-prem fleet (citrine + mono).
#
# Generates ./benchmarks-ci-01.yml and ./benchmarks-ci-02.yml. Workload is
# split across two YAMLs so each scheduled run hits roughly half the fleet
# and overall wall-clock time stays under the 4h job budget.
#
# Edit this file then regenerate from the repo root:
#   python ./scripts/pod-scheduler/main.py \
#       --config ./build/benchmarks_ci_pods.yml --yaml-output ./build
metadata:
  name: CI Benchmarks Configuration
  description: Pod-based scheduling for continuous integration benchmarks
  version: "2.0"
  schedule: "0 3/12 * * *"
  queues:
    - citrine1
    - citrine2
    - citrine3
    - mono
  yaml_generation:
    target_yaml_count: 2
    # Stagger the second YAML by 6h so the fleet isn't slammed twice at once.
    schedule_offset_hours: 6

# Each pod's `machines` and `profiles` use positional shorthand:
# 1 entry  = [sut]                 (single-type scenarios)
# 2 entries = [sut, load]          (dual-type scenarios)
# 3 entries = [sut, load, db]      (triple-type scenarios)
# The named-dict form ({sut: ..., load: ..., db: ...}) is still accepted
# if you ever need to declare just a subset of roles explicitly.
pods:
  - name: intel-lin
    machines: [intel-lin, intel-load,  intel-db]
    profiles: [intel-lin-app, intel-load-load,  intel-db-db]

  - name: intel-win
    # intel-win shares intel-db with intel-lin; the scheduler keeps them out
    # of the same stage when both run a triple-type scenario.
    machines: [intel-win, intel-load2, intel-db]
    profiles: [intel-win-app, intel-load2-load, intel-db-db]

  - name: gold-lin
    machines: [gold-lin, gold-load,  gold-db]
    profiles: [gold-lin-app, gold-load-load,  gold-db-db]

  - name: gold-win
    machines: [gold-win, gold-load2, gold-db]
    profiles: [gold-win-app, gold-load2-load, gold-db-db]

  - name: amd-lin2
    # Reuses gold-lin's load + db; cannot run alongside gold-lin triples.
    machines: [amd-lin2, gold-load, gold-db]
    profiles: [amd-lin2-app, gold-load-load, gold-db-db]

  - name: intel-perflin
    # SUT+load only; not eligible for triple scenarios.
    machines: [intel-perflin, intel-perfload]
    profiles: [intel-perflin-app, intel-perfload-load]

scenarios:
  - name: Baselines
    template: baselines-scenarios.yml
    type: dual
    pods: [gold-lin, gold-win, intel-lin, intel-win, amd-lin2]
    estimated_runtime: 30

  - name: Baselines Database
    template: baselines-database-scenarios.yml
    type: triple
    pods: [gold-lin, gold-win, intel-lin, intel-win, amd-lin2]
    estimated_runtime: 45

  - name: Blazor
    template: blazor-scenarios.yml
    type: dual
    pods: [gold-lin, intel-lin, intel-perflin]
    estimated_runtime: 45

  - name: Build
    template: build-perf-scenarios.yml
    type: single
    pods: [gold-lin, gold-win, intel-lin, intel-win]
    estimated_runtime: 1

  - name: Containers
    template: containers-scenarios.yml
    type: triple
    pods: [gold-lin, intel-lin]
    estimated_runtime: 90

  - name: Crossgen
    template: crossgen2-scenarios.yml
    type: dual
    pods: [gold-lin, gold-win, intel-lin, intel-win, amd-lin2]
    estimated_runtime: 5

  - name: Custom Proxies
    template: proxies-custom-scenarios.yml
    type: triple
    pods: [gold-lin, intel-lin]
    estimated_runtime: 5

  - name: EF Core
    template: efcore-scenarios.yml
    type: dual
    pods: [gold-win, intel-win]
    estimated_runtime: 15

  - name: Frameworks
    template: frameworks-scenarios.yml
    type: triple
    pods: [gold-lin, intel-lin, amd-lin2]
    estimated_runtime: 15

  - name: Frameworks Database
