    type: dual
    pods: [gold-lin, gold-win, intel-lin, intel-win]
    estimated_runtime: 70

  - name: HttpClient
    template: httpclient-scenarios.yml
    type: dual
    pods: [gold-lin, gold-win, intel-lin, intel-win]
    estimated_runtime: 45

  - name: MVC
