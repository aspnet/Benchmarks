# yaml-language-server: $schema=../scripts/pod-scheduler/pod-config.schema.json

# CI pod-scheduler config: on-prem fleet (citrine + mono).
#
# Generates ./benchmarks-ci-01.yml and ./benchmarks-ci-02.yml. Workload is
# split across two YAMLs so each scheduled run hits roughly half the fleet
# and overall wall-clock time stays under the 4h job budget.
#
# Edit this file then regenerate from the repo root:
#   python ./scripts/pod-scheduler/main.py \
#       --config ./build/benchmarks_ci_pods.yml --yaml-output ./build
metadata:
  name: CI Benchmarks Configuration
  description: Pod-based scheduling for continuous integration benchmarks
  version: "2.0"
  schedule: "0 3/12 * * *"
  queues:
  - citrine1
  - citrine2
  - citrine3
  - mono
  yaml_generation:
    target_yaml_count: 2
    # Stagger the second YAML by 6h so the fleet isn't slammed twice at once.
    schedule_offset_hours: 6

# Each pod's `machines` and `profiles` are parallel arrays: machines[i]
# runs profiles[i]. The number of entries decides which scenarios the pod
# can run:
#   1 entry   -> SUT only          (single-type scenarios)
#   2 entries -> SUT + load        (dual-type scenarios)
#   3 entries -> SUT + load + db   (triple-type scenarios)
pods:
- name: gold-lin
  machines:
  - gold-lin
  - gold-load
  - gold-db
  profiles:
  - gold-lin-app
  - gold-load-load
  - gold-db-db

- name: gold-win
  # gold-win shares gold-db with gold-lin; the scheduler keeps them out of
  # the same stage when both run a triple-type scenario.
  machines:
  - gold-win
  - gold-load2
  - gold-db
  profiles:
  - gold-win-app
  - gold-load2-load
  - gold-db-db

scenarios:
- name: Baselines
  template: baselines-scenarios.yml
  type: dual
  pods: [gold-lin, gold-win]
  estimated_runtime: 30

- name: Baselines Database
  template: baselines-database-scenarios.yml
  type: triple
  pods: [gold-lin, gold-win]
  estimated_runtime: 45

- name: Blazor
  template: blazor-scenarios.yml
  type: dual
  pods: [gold-lin]
  estimated_runtime: 45

- name: Build
  template: build-perf-scenarios.yml
  type: single
  pods: [gold-lin, gold-win]
  estimated_runtime: 1

- name: Containers
  template: containers-scenarios.yml
  type: triple
  pods: [gold-lin]
  estimated_runtime: 90

- name: Crossgen
  template: crossgen2-scenarios.yml
  type: dual
  pods: [gold-lin, gold-win]
  estimated_runtime: 5

- name: Custom Proxies
  template: proxies-custom-scenarios.yml
  type: triple
  pods: [gold-lin]
