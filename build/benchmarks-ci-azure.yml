      arguments: "$(ciProfile) --profile cobalt-cloud-lin-server-app --profile cobalt-cloud-lin-client-load --profile cobalt-cloud-lin-db-db "

- job: Baselines_Database_azure_arm64
  displayName: 2- Baselines Database azure-arm64
  pool: server
  timeoutInMinutes: 120
  dependsOn: [Containers_azure_arm64, Containers_azure2_amd64]
  condition: succeededOrFailed()
  steps:
