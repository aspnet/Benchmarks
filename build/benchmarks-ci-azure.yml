# Do not change this file, it is generated by the pod-scheduler.
# Source of truth: see ../scripts/pod-scheduler/README.md
# To regenerate, run from the repo root:
#   python ./scripts/pod-scheduler/main.py --config ./build/benchmarks_ci_azure_pods.json --base-name benchmarks-ci-azure --yaml-output ./build

trigger: none
pr: none

schedules:
- cron: "0 2/12 * * *"
  always: true
  branches:
    include:
    - main

variables:
  - template: job-variables.yml
  - name: session
    value: $(Build.BuildNumber)
  - name: buildId
    value: $(Build.BuildId)
  - name: buildNumber
    value: $(Build.BuildNumber)
  - name: am
    value: $[lt(format('{0:HH}', pipeline.startTime), 12)]
  - name: pm
    value: $[ge(format('{0:HH}', pipeline.startTime), 12)]

jobs:

# GROUP 1

- job: Containers_azure_arm64
  displayName: 1- Containers azure-arm64
  pool: server
  timeoutInMinutes: 180
  dependsOn: []
  condition: succeededOrFailed()
  steps:
  - template: containers-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: azure
      serviceBusNamespace: aspnetbenchmarks
      arguments: "$(ciProfile) --profile azure-server-arm64-app --profile azure-client-load --profile azure-db-db "

- job: Containers_azure2_amd64
  displayName: 1- Containers azure2-amd64
  pool: server
  timeoutInMinutes: 180
  dependsOn: []
  condition: succeededOrFailed()
  steps:
  - template: containers-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: azurearm64
      serviceBusNamespace: aspnetbenchmarks
      arguments: "$(ciProfile) --profile azure2-server-amd64-app --profile azure2-client-load --profile azure2-db-db "

# GROUP 2

- job: Containers_cobalt_cloud_lin
  displayName: 2- Containers cobalt-cloud-lin
  pool: server
  timeoutInMinutes: 180
  dependsOn: [Containers_azure_arm64, Containers_azure2_amd64]
  condition: succeededOrFailed()
  steps:
  - template: containers-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: azure
