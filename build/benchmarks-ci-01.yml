      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: citrine3
      serviceBusNamespace: aspnetbenchmarks
      arguments: "$(ciProfile) --profile gold-win-app --profile gold-load2-load "

- job: Grpc_intel_win
