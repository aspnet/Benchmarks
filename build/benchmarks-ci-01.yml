# Do not change this file, it is generated by the pod-scheduler.
# Source of truth: see ../scripts/pod-scheduler/README.md
# To regenerate, run from the repo root:
#   python ./scripts/pod-scheduler/main.py --config ./build/benchmarks_ci_pods.yml --base-name benchmarks-ci --yaml-output ./build

trigger: none
pr: none

schedules:
- cron: "0 3/12 * * *"
  always: true
  branches:
    include:
    - main

variables:
  - template: job-variables.yml
  - name: session
    value: $(Build.BuildNumber)
  - name: buildId
    value: $(Build.BuildId)
  - name: buildNumber
    value: $(Build.BuildNumber)
  - name: am
    value: $[lt(format('{0:HH}', pipeline.startTime), 12)]
  - name: pm
    value: $[ge(format('{0:HH}', pipeline.startTime), 12)]

jobs:

# GROUP 1

- job: Proxies_gold_lin
  displayName: 1- Proxies gold-lin
  pool: server
  timeoutInMinutes: 240
  dependsOn: []
  condition: succeededOrFailed()
  steps:
  - template: proxies-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
      serviceBusQueueName: citrine1
      serviceBusNamespace: aspnetbenchmarks
      arguments: "$(ciProfile) --profile gold-lin-app --profile gold-load-load --profile gold-db-db "

- job: Grpc_gold_win
  displayName: 1- Grpc gold-win
  pool: server
  timeoutInMinutes: 140
  dependsOn: []
  condition: succeededOrFailed()
  steps:
  - template: grpc-scenarios.yml
    parameters:
      connection: ASPNET Benchmarks Service Bus
