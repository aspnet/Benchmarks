# Examples:
# --config benchmarks.certapi.yml --scenario ApiCrudListProducts --profile aspnet-perf-lin

imports:
- https://raw.githubusercontent.com/dotnet/crank/main/src/Microsoft.Crank.Jobs.HttpClient/httpclient.yml
- https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/BenchmarksApps/Mvc/mvcserver.yml
- https://raw.githubusercontent.com/aspnet/Benchmarks/main/scenarios/aspnet.profiles.yml

variables:
    serverPort: 5000

scenarios:
  # Do cert auth without mvc
  NoMvcAuth:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true /p:UseOnlyAuth=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products?pageNumber=1&pageSize=10
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx

    # List products
  ApiCrudListProducts:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products?pageNumber=1&pageSize=10
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx

    # Get an individual product
  ApiCrudGetProductDetails:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products/1
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx

   # Add product
  ApiCrudAddProduct:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products
        verb: POST
        bodyFile: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/BenchmarksApps/Mvc/crudproductbody.json
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx

    # Update product
  ApiCrudUpdateProduct:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products/1
        verb: PUT
        bodyFile: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/BenchmarksApps/Mvc/crudproductbody.json
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx

    # Remove a product item
  ApiCrudDeleteProduct:
    application:
      job: mvcServer
      buildArguments: 
      - "/p:UseCertAuth=true /p:UseAuthorize=true"
      variables:
        serverScheme: https
    load:
      job: httpclient
      variables:
        path: /Products/1
        verb: DELETE
        serverScheme: https
        # [SuppressMessage("Microsoft.Security", "CS002:SecretInNextLine", Justification="Benchmark code, not a secret")]
        certPwd: testPassword
        certPath: https://raw.githubusercontent.com/aspnet/Benchmarks/main/src/Benchmarks/testCert.pfx
